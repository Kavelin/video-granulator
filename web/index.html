<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Video Granulator</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Playfair Display", serif;
        background: white;
        color: var(--text);
      }
      main {
        max-width: 80vw;
        margin: 0 auto;
      }
      .panel {
        background: #ffffff;
        padding: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.5rem);
      }
      p {
        margin: 0 0 16px;
        color: black;
        line-height: 1.5;
      }
      label {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
      }
      input[type="file"] {
        color: black;
      }
      canvas {
        display: block;
        height: 90vh;
        max-width: 100%;
        margin-top: 20px;
        background: #000;
      }
      #status {
        margin-top: 12px;
        color: var(--accent);
        font-size: 0.95rem;
      }

      .window {
        position: fixed;
        width: 400px;
        height: 200px;
        box-shadow:
          1px 1px 4px rgba(0, 0, 0, 0, 0.9),
          -1px 1px 4px rgba(0, 0, 0, 0, 0.9);
      }

      .window-content {
        background: #fff;
        color: black;
        padding: 5px;
      }


      .window-top,
      .window-top-no-bind {
        cursor: move;
        text-align: right;
        height: 20px;
        border-top-right-radius: 5px;
        border-top-left-radius: 5px;
        padding: 5px;
        background-color: #c1fbff;
      }

      .window-top-no-bind {
        cursor: inherit;
      }
      #myWindow {
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="myWindow" class="window">
        <div class="window-top"></div>
        <div class="window-content">
          <h2>video Granulator</h2>

          <div id="status">Loading wasm module...</div>
          <label>
            <span>Choose video</span>
            <input type="file" id="video-upload" accept="video/*" disabled />
          </label>
        </div>
      </div>
      <section class="panel">
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div>
          <label
            >Spray:
            <input type="range" style="accent-color:#c1fbff;" data-initial=0 id="spray-control" min="0" max="50" value="0"
          /></label>
          <label
            >Step:
            <input type="range" style="accent-color:#c1fbff;" data-initial=0 id="step-control" min="-5" max="5" value="0"
          /></label>
          <label
            >Grain Size:
            <input type="range" style="accent-color:#c1fbff;" data-initial=5 id="grain-control" min="1" max="30" value="5"
          /></label>
          <label
            >Overlay:
            <input type="range" style="accent-color:#c1fbff;" data-initial=1 id="overlay-control" min="1" max="40" value="1"
          /></label>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      function makeDraggable(element) {
        //Make an element draggable (or if it has a .window-top class, drag based on the .window-top element)
        let currentPosX = 0,
          currentPosY = 0,
          previousPosX = 0,
          previousPosY = 0;

        //If there is a window-top classed element, attach to that element instead of full window
        if (element.querySelector(".window-top")) {
          //If present, the window-top element is where you move the parent element from
          element.querySelector(".window-top").onmousedown = dragMouseDown;
        } else {
          //Otherwise, move the element itself
          element.onmousedown = dragMouseDown;
        }

        function dragMouseDown(e) {
          //Prevent any default action on this element (you can remove if you need this element to perform its default action)
          e.preventDefault();
          //Get the mouse cursor position and set the initial previous positions to begin
          previousPosX = e.clientX;
          previousPosY = e.clientY;
          //When the mouse is let go, call the closing event
          document.onmouseup = closeDragElement;
          //call a function whenever the cursor moves
          document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
          //Prevent any default action on this element (you can remove if you need this element to perform its default action)
          e.preventDefault();
          //Calculate the new cursor position by using the previous x and y positions of the mouse
          currentPosX = previousPosX - e.clientX;
          currentPosY = previousPosY - e.clientY;
          //Replace the previous positions with the new x and y positions of the mouse
          previousPosX = e.clientX;
          previousPosY = e.clientY;
          //Set the element's new position
          element.style.top = element.offsetTop - currentPosY + "px";
          element.style.left = element.offsetLeft - currentPosX + "px";
        }

        function closeDragElement() {
          //Stop moving when mouse button is released and release events
          document.onmouseup = null;
          document.onmousemove = null;
        }
      }
      //myWindow will only be able to be moved via the top bar (.window-top element). The main element does nothing on mouse down.
      makeDraggable(document.querySelector("#myWindow"));

      var Module = {
        canvas: document.getElementById("canvas"),
        onRuntimeInitialized() {
          window.videoGranulatorApp(Module);
        },
      };
    </script>
    <script src="build/vidgrains.js"></script>
  </body>
</html>
